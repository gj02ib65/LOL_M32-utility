const config = global.get("app_config") || {};
const SIM_MODE = (config.sim_mode === true || config.sim_mode === "true");
const REPLICA_IP = config.replica_ip || "127.0.0.1";

// Improved Safe List parsing
const SAFE_NAMES = (config.safe_names || "")
    .split(',')
    .map(s => s.trim().toLowerCase())
    .filter(s => s.length > 0); // Remove empty entries

let topic = msg.topic;
let payload = Array.isArray(msg.payload) ? msg.payload[0] : msg.payload;
let shouldSync = false; // We start by assuming we are NOT syncing

function cleanOSC(input) {
    return (typeof input === 'string') ? input.replace(/\0/g, '').trim() : input;
}

// 1. WHITELIST FILTERING & PROCESSING
if (topic.startsWith("/ch/")) {
    let chIndex = topic.split('/')[2];
    let key = `ch_${chIndex}_name`;

    // Only allow specific sub-topics for Channels
    if (topic.endsWith("/config/name")) {
        shouldSync = true;
        let newName = cleanOSC(payload);
        global.set(key, newName);
        msg.payload = { type: "s", value: newName };
    } 
    else if (topic.endsWith("/mix/on")) {
        shouldSync = true;
        let currentName = (global.get(key) || "CH " + chIndex).toLowerCase();
        let isSafe = SAFE_NAMES.some(word => word && currentName.includes(word));
        
        if (isSafe) {
            node.status({fill:"yellow", shape:"ring", text: "Safe: " + currentName});
            return [null, { audit: { status: "BLOCKED", detail: currentName } }]; 
        }
        msg.payload = { type: "i", value: parseInt(payload) };
    }
    else if (topic.endsWith("/grp/dca")) {
        shouldSync = true;
        msg.payload = { type: "i", value: parseInt(payload) };
    }
} 
else if (topic.startsWith("/dca/")) {
    // Only allow Name and Mute for DCAs
    if (topic.endsWith("/config/name") || topic.endsWith("/on")) {
        shouldSync = true;
        msg.payload = (topic.endsWith("/on")) 
            ? { type: "i", value: parseInt(payload) } 
            : { type: "s", value: cleanOSC(payload) };
    }
}

// 2. THE GATEKEEPER
// If the topic didn't match our allowed list above, KILL the message here.
if (!shouldSync) {
    return null; 
}

// 3. FINAL ROUTING (Only reached if shouldSync is true)
msg.ip = REPLICA_IP;
msg.port = 10023;

if (SIM_MODE) {
    node.status({fill:"blue", shape:"dot", text: "SIMULATED"});
    return [null, msg];
} else {
    node.status({fill:"green", shape:"dot", text: "Synced: " + topic});
    return [msg, RED.util.cloneMessage(msg)]; 
}